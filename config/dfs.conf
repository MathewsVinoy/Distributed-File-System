# Distributed File System configuration
[global]
block_size=1024
metadata_file=database/metadata.txt
last_seen_file=database/lastseen.csv

[metadata]
listen_addr=0.0.0.0
listen_port=9000
heartbeat_port=9001
tls_enabled=false
tls_cert_file=config/certs/metadata_cert.pem
tls_key_file=config/certs/metadata_key.pem
tls_ca_file=config/certs/ca.pem
tls_require_client_cert=false

[data]
bind_addr=0.0.0.0
port=8000
data_file=database/my_file.txt
log_dir=database/log
metadata_host=127.0.0.1
metadata_port=9000
heartbeat_host=127.0.0.1
heartbeat_port=9001
tls_enabled=false
tls_cert_file=config/certs/dataserver_cert.pem
tls_key_file=config/certs/dataserver_key.pem
tls_ca_file=config/certs/ca.pem
tls_require_client_cert=false
metadata_tls_enabled=false
metadata_tls_cert_file=config/certs/dataserver_cert.pem
metadata_tls_key_file=config/certs/dataserver_key.pem
metadata_tls_ca_file=config/certs/ca.pem
metadata_tls_require_client_cert=false

[client]
metadata_host=127.0.0.1
metadata_port=9000
output_file=out/cli/myfile.txt
tls_enabled=false
tls_cert_file=config/certs/client_cert.pem
tls_key_file=config/certs/client_key.pem
tls_ca_file=config/certs/ca.pem
